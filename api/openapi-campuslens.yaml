openapi: 3.0.3
info:
  title: CampusLens API
  version: 1.0.0
  description: CampusLens（校园慧眼）校园地标智能检索与导览系统接口草案。
servers:
  - url: http://localhost:8080
    description: Spring Boot backend
paths:
  /api/health:
    get:
      summary: 后端健康检查
      tags: [System]
      responses:
        "200":
          description: 后端服务运行正常
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
  /api/search/upload:
    post:
      summary: 上传图片并检索 Top-5 地标
      tags: [Search]
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
      responses:
        "200":
          description: 检索成功；若算法服务暂不可用，返回空候选结果、lowConfidence=true 并在 message 中说明原因
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SearchResponse"
        "400":
          description: 图片格式或参数错误
  /api/landmarks:
    get:
      summary: 获取地标列表
      tags: [Landmark]
      responses:
        "200":
          description: 地标列表
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/LandmarkSummary"
  /api/landmarks/{id}:
    get:
      summary: 获取地标详情
      tags: [Landmark]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "200":
          description: 地标详情
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LandmarkDetail"
        "404":
          description: 地标不存在
  /api/feedback:
    post:
      summary: 提交识别反馈
      tags: [Feedback]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FeedbackRequest"
      responses:
        "200":
          description: 反馈提交成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FeedbackResponse"
  /api/admin/auth/login:
    post:
      summary: 管理员轻量登录
      tags: [Admin]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminLoginRequest"
      responses:
        "200":
          description: 登录成功；V2 使用 admin/admin 本地演示账号
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminLoginResponse"
        "400":
          description: 账号或密码错误
  /api/admin/search-records:
    get:
      summary: 查看最近检索记录
      tags: [Admin]
      responses:
        "200":
          description: 最近 50 条检索记录
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AdminSearchRecord"
  /api/admin/landmarks:
    post:
      summary: 新增地标
      tags: [Admin]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LandmarkCreateRequest"
      responses:
        "200":
          description: 新增成功
  /api/admin/landmarks/{id}:
    put:
      summary: 修改地标
      tags: [Admin]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LandmarkCreateRequest"
      responses:
        "200":
          description: 修改成功
  /api/admin/landmarks/{id}/images:
    post:
      summary: 上传地标样本图片
      tags: [Admin]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
                angle:
                  type: string
                lightCondition:
                  type: string
      responses:
        "200":
          description: 上传成功
  /api/admin/index/rebuild:
    post:
      summary: 重建地标统计参数
      tags: [Admin]
      responses:
        "200":
          description: 已提交统计参数重建任务
  /api/admin/feedback:
    get:
      summary: 查看反馈记录
      tags: [Admin]
      responses:
        "200":
          description: 反馈列表
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AdminFeedbackRecord"
  /api/admin/feedback/{id}/status:
    post:
      summary: 更新反馈处理状态
      tags: [Admin]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FeedbackStatusRequest"
      responses:
        "200":
          description: 状态更新成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FeedbackResponse"
components:
  schemas:
    SearchResponse:
      type: object
      required: [searchRecordId, results]
      properties:
        searchRecordId:
          type: integer
          format: int64
        uploadImageUrl:
          type: string
        lowConfidence:
          type: boolean
          description: 兼容字段；true 表示所有候选均为低匹配等级，或算法服务暂不可用
        message:
          type: string
        results:
          type: array
          items:
            $ref: "#/components/schemas/SearchResult"
    SearchResult:
      type: object
      required: [rank, landmarkId, landmarkCode, name, score, confidenceLevel]
      properties:
        rank:
          type: integer
          example: 1
        landmarkId:
          type: integer
          format: int64
        landmarkCode:
          type: string
          example: L01
        name:
          type: string
          example: 图书馆
        englishName:
          type: string
          example: Library
        score:
          type: number
          format: double
          description: 基于马氏距离 sigmoid 归一化得到的经验匹配分，仅用于排序、展示区分度和辅助判断，不具备概率或统计置信度含义
          example: 0.86
        confidenceLevel:
          type: string
          description: 兼容字段，算法服务给出的经验匹配等级
          enum: [high, medium, low]
          example: high
        mahalanobisDistance:
          type: number
          format: double
          nullable: true
          description: 查询图到候选地标特征分布的马氏距离，数值越小表示越接近
          example: 4.3239
        coverImageUrl:
          type: string
        summary:
          type: string
        locationText:
          type: string
        mapX:
          type: number
        mapY:
          type: number
    LandmarkSummary:
      type: object
      properties:
        id:
          type: integer
          format: int64
        code:
          type: string
        name:
          type: string
        englishName:
          type: string
        type:
          type: string
        summary:
          type: string
        coverImageUrl:
          type: string
        locationText:
          type: string
        mapX:
          type: number
        mapY:
          type: number
    LandmarkDetail:
      allOf:
        - $ref: "#/components/schemas/LandmarkSummary"
        - type: object
          properties:
            description:
              type: string
            locationText:
              type: string
            mapX:
              type: number
            mapY:
              type: number
            images:
              type: array
              items:
                $ref: "#/components/schemas/LandmarkImage"
    LandmarkImage:
      type: object
      properties:
        id:
          type: integer
          format: int64
        imageUrl:
          type: string
        angle:
          type: string
        lightCondition:
          type: string
        isCover:
          type: boolean
    FeedbackRequest:
      type: object
      required: [searchRecordId, feedbackType]
      properties:
        searchRecordId:
          type: integer
          format: int64
        predictedLandmarkId:
          type: integer
          format: int64
        confirmedLandmarkId:
          type: integer
          format: int64
        feedbackType:
          type: string
          enum: [correct, wrong, uncertain]
        comment:
          type: string
    FeedbackResponse:
      type: object
      properties:
        feedbackId:
          type: integer
          format: int64
        status:
          type: string
          example: pending
        message:
          type: string
          example: 反馈已记录，后续可进入后台审核
    FeedbackStatusRequest:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [pending, accepted, ignored]
    AdminLoginRequest:
      type: object
      required: [username, password]
      properties:
        username:
          type: string
          example: admin
        password:
          type: string
          example: admin
    AdminLoginResponse:
      type: object
      properties:
        loggedIn:
          type: boolean
        username:
          type: string
        role:
          type: string
        message:
          type: string
    AdminSearchRecord:
      type: object
      properties:
        id:
          type: integer
          format: int64
        uploadImageUrl:
          type: string
        bestLandmarkName:
          type: string
          nullable: true
        bestScore:
          type: number
          format: double
          nullable: true
        status:
          type: string
          enum: [success, low_confidence, empty_result, algorithm_unavailable]
        lowConfidence:
          type: boolean
        message:
          type: string
        guestId:
          type: string
        createdAt:
          type: string
          format: date-time
    AdminFeedbackRecord:
      type: object
      properties:
        id:
          type: integer
          format: int64
        searchRecordId:
          type: integer
          format: int64
        predictedLandmarkId:
          type: integer
          format: int64
          nullable: true
        predictedLandmarkName:
          type: string
          nullable: true
        confirmedLandmarkId:
          type: integer
          format: int64
          nullable: true
        confirmedLandmarkName:
          type: string
          nullable: true
        feedbackType:
          type: string
          enum: [correct, wrong, uncertain]
        comment:
          type: string
        status:
          type: string
          enum: [pending, accepted, ignored]
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    LandmarkCreateRequest:
      type: object
      required: [code, name]
      properties:
        code:
          type: string
        name:
          type: string
        englishName:
          type: string
        type:
          type: string
        summary:
          type: string
        description:
          type: string
        locationText:
          type: string
        mapX:
          type: number
        mapY:
          type: number
    HealthResponse:
      type: object
      properties:
        status:
          type: string
          example: ok
        message:
          type: string
