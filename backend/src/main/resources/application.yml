server:
  port: 8080
  tomcat:
    threads:
      max: ${CAMPUSLENS_TOMCAT_MAX_THREADS:120}
      min-spare: ${CAMPUSLENS_TOMCAT_MIN_SPARE_THREADS:10}
    accept-count: ${CAMPUSLENS_TOMCAT_ACCEPT_COUNT:100}
    connection-timeout: ${CAMPUSLENS_TOMCAT_CONNECTION_TIMEOUT:20s}

spring:
  datasource:
    url: ${CAMPUSLENS_DATASOURCE_URL:jdbc:mysql://127.0.0.1:3306/campuslens?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false}
    username: ${CAMPUSLENS_DATASOURCE_USERNAME:campuslens}
    password: ${CAMPUSLENS_DATASOURCE_PASSWORD:campuslens123}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: ${CAMPUSLENS_HIKARI_MAX_POOL_SIZE:20}
      minimum-idle: ${CAMPUSLENS_HIKARI_MIN_IDLE:5}
      connection-timeout: ${CAMPUSLENS_HIKARI_CONNECTION_TIMEOUT_MS:30000}
  sql:
    init:
      mode: never
  flyway:
    enabled: true
    locations: filesystem:../database/migration
    baseline-on-migrate: true
    baseline-version: 1
    validate-on-migrate: false
  servlet:
    multipart:
      max-file-size: 8MB
      max-request-size: 10MB

campuslens:
  algorithm:
    base-url: http://localhost:8000
    connect-timeout-ms: ${CAMPUSLENS_ALGORITHM_CONNECT_TIMEOUT_MS:3000}
    read-timeout-ms: ${CAMPUSLENS_ALGORITHM_READ_TIMEOUT_MS:20000}
  async:
    adaptation:
      core-size: ${CAMPUSLENS_ADAPTATION_CORE_SIZE:2}
      max-size: ${CAMPUSLENS_ADAPTATION_MAX_SIZE:4}
      queue-capacity: ${CAMPUSLENS_ADAPTATION_QUEUE_CAPACITY:100}
