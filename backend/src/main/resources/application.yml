server:
  port: 8080

spring:
  datasource:
    url: ${CAMPUSLENS_DATASOURCE_URL:jdbc:mysql://localhost:3306/campuslens?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false}
    username: ${CAMPUSLENS_DATASOURCE_USERNAME:campuslens}
    password: ${CAMPUSLENS_DATASOURCE_PASSWORD:campuslens123}
    driver-class-name: com.mysql.cj.jdbc.Driver
  sql:
    init:
      mode: always
      schema-locations: file:../database/schema.sql
      data-locations: file:../database/seed_landmarks.sql
  servlet:
    multipart:
      max-file-size: 8MB
      max-request-size: 10MB

campuslens:
  algorithm:
    base-url: http://localhost:8000
