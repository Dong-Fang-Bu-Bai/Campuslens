spring:
  datasource:
    url: jdbc:h2:mem:campuslens;MODE=MySQL;DATABASE_TO_LOWER=TRUE;CASE_INSENSITIVE_IDENTIFIERS=TRUE;DB_CLOSE_DELAY=-1
    username: sa
    password:
    driver-class-name: org.h2.Driver
  sql:
    init:
      mode: always
      schema-locations: file:../database/schema.sql
      data-locations: file:../database/seed_landmarks.sql
