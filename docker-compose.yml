services:
  redis:
    image: redis:7.4-alpine
    container_name: campuslens-redis
    restart: unless-stopped
    ports:
      - "${CAMPUSLENS_REDIS_PORT:-6379}:6379"
    volumes:
      - campuslens_redis_data:/data
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  mysql:
    image: mysql:8.4
    container_name: campuslens-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${CAMPUSLENS_DB_ROOT_PASSWORD:-root123456}
      MYSQL_DATABASE: ${CAMPUSLENS_DB_NAME:-campuslens}
      MYSQL_USER: ${CAMPUSLENS_DB_USERNAME:-campuslens}
      MYSQL_PASSWORD: ${CAMPUSLENS_DB_PASSWORD:-campuslens123}
      TZ: Asia/Shanghai
    ports:
      - "${CAMPUSLENS_DB_PORT:-3306}:3306"
    volumes:
      - campuslens_mysql_data:/var/lib/mysql
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_0900_ai_ci
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -u$$MYSQL_USER -p$$MYSQL_PASSWORD --silent"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  campuslens_mysql_data:
  campuslens_redis_data:
